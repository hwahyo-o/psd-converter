<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
:root{font-family:Inter,Arial,sans-serif;color:#222;background:#fff}body{margin:0;padding:16px}h1{margin:0 0 6px;font-size:16px;line-height:22px}p{margin:0 0 12px;color:#666;font-size:12px;line-height:17px}.drop{display:grid;gap:8px;padding:18px;border:1px dashed #c8c8d0;border-radius:8px;background:#f7f7f9;text-align:center}input{width:100%;font-size:12px}.summary{display:grid;gap:8px;margin:14px 0}.row{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #e4e4e8;font-size:12px}.row strong{text-align:right}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{min-height:32px;border:1px solid #d2d2d8;border-radius:6px;background:#fff;color:#222;cursor:pointer;font:inherit;font-size:12px;font-weight:600}button.primary{border-color:#12877f;background:#12877f;color:#fff}button:disabled{cursor:not-allowed;opacity:.5}code{display:block;max-height:108px;overflow:auto;margin-top:12px;padding:8px;border-radius:6px;background:#f7f7f9;color:#666;font-size:11px;line-height:16px;white-space:pre-wrap}
</style>
</head>
<body>
<h1>PSD 변환기 가져오기</h1>
<p>웹에서 받은 payload zip을 압축 해제한 뒤 <strong>document.json</strong>을 선택하세요.</p>
<label class="drop"><input id="file" type="file" accept="application/json,.json" /><span id="fileLabel">선택된 파일 없음</span></label>
<div class="summary"><div class="row"><span>원본</span><strong id="source">-</strong></div><div class="row"><span>문서</span><strong id="size">-</strong></div><div class="row"><span>총 Layers</span><strong id="layers">-</strong></div><div class="row"><span>이미지 보존</span><strong id="image">-</strong></div></div>
<div class="actions"><button id="cancel">닫기</button><button class="primary" id="import" disabled>Figma에 가져오기</button></div>
<code id="log">payload를 기다리는 중입니다.</code>
<script>
var fileInput=document.getElementById('file');var fileLabel=document.getElementById('fileLabel');var importButton=document.getElementById('import');var cancelButton=document.getElementById('cancel');var log=document.getElementById('log');var documentModel=null;function setSummary(model){document.getElementById('source').textContent=model.sourceName||'-';document.getElementById('size').textContent=(model.width||0)+' x '+(model.height||0);document.getElementById('layers').textContent=String(model.layerCount||0);document.getElementById('image').textContent=String(model.imageCount||model.fallbackCount||0)}fileInput.addEventListener('change',async function(event){var file=event.target.files[0];if(!file)return;try{var text=await file.text();documentModel=JSON.parse(text);if(!Array.isArray(documentModel.layers))throw new Error('LayerBridge document.json 형식이 아닙니다.');fileLabel.textContent=file.name;setSummary(documentModel);importButton.disabled=false;log.textContent='payload를 읽었습니다. 현재 Figma 페이지에 새 프레임을 생성합니다.'}catch(error){documentModel=null;importButton.disabled=true;log.textContent=error&&error.message?error.message:'payload를 읽을 수 없습니다.'}});importButton.addEventListener('click',function(){if(!documentModel)return;importButton.disabled=true;log.textContent='Figma 노드를 생성하는 중입니다...';parent.postMessage({pluginMessage:{type:'import-document',document:documentModel}},'*')});cancelButton.addEventListener('click',function(){parent.postMessage({pluginMessage:{type:'cancel'}},'*')});onmessage=function(event){var message=event.data.pluginMessage;if(!message)return;if(message.type==='import-complete'){log.textContent='완료되었습니다. 네이티브 '+message.report.native+', 부분 보존 '+message.report.partial+', 이미지 보존 '+message.report.image+', 미지원 '+message.report.unsupported;importButton.disabled=false}if(message.type==='import-error'){log.textContent=message.detail;importButton.disabled=false}};
</script>
</body>
</html>
