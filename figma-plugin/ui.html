<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #1e1e2e; --surface: #2a2a3e; --border: #3a3a4e;
    --accent: #7c6af7; --success: #3ecf8e; --danger: #f5455c;
    --text: #e8e8f0; --muted: #888;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
  h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-area input { display: none; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-label { font-size: 13px; color: var(--muted); }
  .filename {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .filename.show { display: flex; }
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: white;
    transition: opacity 0.15s;
    margin-bottom: 10px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:hover:not(:disabled) { opacity: 0.85; }
  .progress { display: none; margin-bottom: 16px; }
  .progress.show { display: block; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--muted); }
  .message {
    padding: 12px 14px; border-radius: var(--radius);
    font-size: 13px; display: none; margin-bottom: 12px;
  }
  .message.show { display: block; }
  .message.success { background: #0e2a1e; border: 1px solid var(--success); color: #3ecf8e; }
  .message.error { background: #2a0e12; border: 1px solid var(--danger); color: #f87185; }
  .steps {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    margin-top: 8px;
  }
  .steps strong { color: var(--text); }
</style>
</head>
<body>

<h2>🎨 PSD Importer</h2>
<p>PSD Converter 웹앱에서 다운로드한 <strong>Figma JSON 파일</strong>을 업로드하면 캔버스에 레이어 구조를 재현합니다.</p>

<div class="upload-area" onclick="document.getElementById('jsonFile').click()">
  <input type="file" id="jsonFile" accept=".json">
  <div class="upload-icon">📄</div>
  <div class="upload-label">JSON 파일 클릭 또는 드롭</div>
</div>

<div class="filename" id="filenameBar">
  <span>📄</span>
  <span id="filenameText"></span>
</div>

<div class="progress" id="progressBar">
  <div class="progress-label" id="progressLabel">레이어 생성 중...</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="message" id="msgBox"></div>

<button class="btn" id="importBtn" disabled onclick="doImport()">Figma에 가져오기</button>

<div class="steps">
  <strong>사용 방법</strong><br>
  1. PSD Converter 웹앱에서 PSD 변환<br>
  2. "Figma JSON 다운로드"<br>
  3. 이 플러그인에 JSON 업로드<br>
  4. "Figma에 가져오기" 클릭
</div>

<script>
let jsonContent = null;
const fileInput = document.getElementById("jsonFile");
fileInput.addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    jsonContent = ev.target.result;
    document.getElementById("filenameBar").classList.add("show");
    document.getElementById("filenameText").textContent = f.name;
    document.getElementById("importBtn").disabled = false;
    showMsg("", "");
  };
  reader.readAsText(f);
});
function doImport() {
  if (!jsonContent) return;
  document.getElementById("importBtn").disabled = true;
  document.getElementById("progressBar").classList.add("show");
  showMsg("", "");
  parent.postMessage({ pluginMessage: { type: "import", json: jsonContent } }, "*");
}
function showMsg(type, text) {
  const box = document.getElementById("msgBox");
  box.className = "message";
  box.textContent = text;
  if (type && text) box.classList.add("show", type);
}
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === "progress") {
    const pct = msg.total > 0 ? (msg.current / msg.total * 100) : 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = `레이어 생성 중... ${msg.current}/${msg.total}`;
  }
  if (msg.type === "done") {
    document.getElementById("progressBar").classList.remove("show");
    showMsg("success", `✓ 완료! "${msg.name}" 프레임에 ${msg.layers}개 레이어 생성됨`);
    document.getElementById("importBtn").disabled = false;
  }
  if (msg.type === "error") {
    document.getElementById("progressBar").classList.remove("show");
    showMsg("error", "⚠ " + msg.message);
    document.getElementById("importBtn").disabled = false;
  }
};
</script>
</body>
</html>
