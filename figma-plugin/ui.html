<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
:root{font-family:Inter,Arial,sans-serif;color:var(--figma-color-text);background:var(--figma-color-bg)}body{margin:0;padding:16px}h1{margin:0 0 6px;font-size:16px;line-height:22px}p{margin:0 0 12px;color:var(--figma-color-text-secondary);font-size:12px;line-height:17px}.drop{display:grid;gap:8px;padding:18px;border:1px dashed var(--figma-color-border);border-radius:8px;background:var(--figma-color-bg-secondary);text-align:center}input{width:100%;font-size:12px}.summary{display:grid;gap:8px;margin:14px 0}.row{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--figma-color-border);font-size:12px}.row strong{text-align:right}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{min-height:32px;border:1px solid var(--figma-color-border);border-radius:6px;background:var(--figma-color-bg);color:var(--figma-color-text);cursor:pointer;font:inherit;font-size:12px;font-weight:600}button.primary{border-color:var(--figma-color-bg-brand);background:var(--figma-color-bg-brand);color:var(--figma-color-text-onbrand)}button:disabled{cursor:not-allowed;opacity:.5}code{display:block;max-height:108px;overflow:auto;margin-top:12px;padding:8px;border-radius:6px;background:var(--figma-color-bg-secondary);color:var(--figma-color-text-secondary);font-size:11px;line-height:16px}
</style>
</head>
<body>
<h1>LayerBridge Importer</h1>
<p>Select <strong>document.json</strong> from an unzipped LayerBridge payload.</p>
<label class="drop"><input id="file" type="file" accept="application/json,.json" /><span id="fileLabel">No payload selected</span></label>
<div class="summary"><div class="row"><span>Source</span><strong id="source">-</strong></div><div class="row"><span>Document</span><strong id="size">-</strong></div><div class="row"><span>Layers</span><strong id="layers">-</strong></div><div class="row"><span>Fallback</span><strong id="fallback">-</strong></div></div>
<div class="actions"><button id="cancel">Cancel</button><button class="primary" id="import" disabled>Import</button></div>
<code id="log">Waiting for payload.</code>
<script>
const fileInput=document.getElementById('file');const fileLabel=document.getElementById('fileLabel');const importButton=document.getElementById('import');const cancelButton=document.getElementById('cancel');const log=document.getElementById('log');let documentModel=null;function setSummary(model){document.getElementById('source').textContent=model.sourceName||'-';document.getElementById('size').textContent=`${model.width||0} x ${model.height||0}`;document.getElementById('layers').textContent=String(model.layerCount||0);document.getElementById('fallback').textContent=String(model.fallbackCount||0)}fileInput.addEventListener('change',async event=>{const file=event.target.files[0];if(!file)return;try{const text=await file.text();documentModel=JSON.parse(text);if(!Array.isArray(documentModel.layers))throw new Error('document.json must contain a LayerBridge layers array.');fileLabel.textContent=file.name;setSummary(documentModel);importButton.disabled=false;log.textContent='Payload loaded. Import will create a new LayerBridge frame on the current page.'}catch(error){documentModel=null;importButton.disabled=true;log.textContent=error.message||'Unable to read payload.'}});importButton.addEventListener('click',()=>{if(!documentModel)return;importButton.disabled=true;log.textContent='Importing nodes...';parent.postMessage({pluginMessage:{type:'import-document',document:documentModel}},'*')});cancelButton.addEventListener('click',()=>parent.postMessage({pluginMessage:{type:'cancel'}},'*'));onmessage=event=>{const message=event.data.pluginMessage;if(!message)return;if(message.type==='import-complete'){log.textContent=`Complete. Native: ${message.report.native}, partial: ${message.report.partial}, fallback: ${message.report.fallback}, unsupported: ${message.report.unsupported}.`;importButton.disabled=false}if(message.type==='import-error'){log.textContent=message.detail;importButton.disabled=false}};
</script>
</body>
</html>
